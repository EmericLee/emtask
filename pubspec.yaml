name: em_task
description: "EM Task - 跨平台任务管理器，支持 CalDAV / Nextcloud Tasks 同步。"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.0

  # 本地数据库（离线缓存）
  drift: ^2.20.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # 网络 / CalDAV
  http: ^1.2.2
  xml: ^6.5.0

  # 数据模型
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 工具
  shared_preferences: ^2.3.0
  uuid: ^4.4.0
  intl: ^0.20.0
  collection: ^1.18.0

  # 桌面窗口控制
  window_manager: ^0.4.2

  # 打印 / PDF 输出
  printing: ^5.13.0
  pdf: ^3.11.0

  # 文件保存对话框（直接导出 PDF）
  file_picker: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
