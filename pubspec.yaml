name: em_task
description: "EM Task - 跨平台任务管理器，支持 CalDAV / Nextcloud Tasks 同步。"
publish_to: 'none'
version: 0.0.14+14

environment:
  # sdk: ^3.11.0
  # sdk: '>=3.8.0 <4.0.0'  # Dart 版本约束
  sdk: ^3.8.0
  flutter: '3.32.5'     # Flutter 版本约束（可选） 兼容 Debian10 libstdc++ 8 for UOS 兼容

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.0

  # 本地数据库（离线缓存）
  drift: ^2.20.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # 网络 / CalDAV
  http: ^1.2.2
  xml: ^6.5.0

  # 数据模型
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 工具
  shared_preferences: ^2.3.0
  uuid: ^4.4.0
  intl: ^0.20.0
  collection: ^1.18.0

  # 桌面窗口控制
  window_manager: ^0.4.2

  # PDF 输出（纯 Dart 生成，不依赖 pdfium，跨平台兼容 UOS ARM64）
  pdf: ^3.11.0

  # 文件保存对话框（直接导出 PDF）
  file_picker: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    # 中文字体兜底（fontFamilyFallback 最后一项），保证 UOS 等缺少中文字体的 Linux 系统正常显示
    # 使用可变字体，Flutter 根据 FontWeight 自动映射 wght 轴；PDF 取默认实例（wght=400）
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Variable.ttf
